name: Build & publish MCP image

# Builds the VCF Planner MCP server image and publishes it to GitHub Container
# Registry (GHCR). No Docker Hub account or secrets needed — auth uses the
# repository's built-in GITHUB_TOKEN.
#
# Resulting image:  ghcr.io/<owner>/vcf-planner-mcp
# Tags: `latest` (default branch), the branch name, the short SHA, and semver
# tags when you push a git tag like `v1.2.0`.

on:
  push:
    branches: [main]
    tags: ['v*']
    # Only rebuild when something that affects the image changes.
    paths:
      - 'core/**'
      - 'mcp/**'
      - '.github/workflows/mcp-image.yml'
  workflow_dispatch: {}

concurrency:
  group: mcp-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the owner — GHCR image names must be lowercase, GitHub usernames
      # can contain uppercase.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vcf-planner-mcp" >> "$GITHUB_OUTPUT"

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root — the image needs ./core and ./mcp
          file: mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
